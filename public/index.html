<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>투두 프로젝트 대시보드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>메인 대시보드</h1>
  </header>
  <main>
    <section id="core-info">
      <div id="progress-container">
        <h2>진행률</h2>
        <div class="progress-bar">
          <div class="progress" id="progressValue"></div>
        </div>
        <span id="progressPercent">0%</span>
      </div>
      <div id="tasks-count">
        <h2>총 업무 수</h2>
        <span id="totalTasks">0</span>
      </div>
      <div id="urgent-tasks">
        <h2>촉박 일정</h2>
        <ul id="urgentList"></ul>
      </div>
    </section>

    <!-- 촉박 일정 알림 -->
    <div id="alertPopup" style="display:none; position:fixed; top:10px; right:10px; background:#ffdddd; padding:10px; border:1px solid red; border-radius:4px; z-index:100;">
      촉박한 일정이 있습니다!
      <button id="alertCloseBtn">닫기</button>
    </div>
  </main>

  <!-- 하단 고정 바 -->
  <footer id="fixedBar" style="position:fixed; bottom:0; width:100%; background:#272727; padding:10px; box-shadow: 0 -2px 5px rgba(0,0,0,0.1);">
    <span id="fixedProgress">진행률: 0%</span> |
    <span id="fixedUrgent">촉박 일정: 없음</span> |
    <span id="fixedTaskCount">업무 수: 0</span>
  </footer>

  <script src="../src/main.js"></script>
  <script src="../src/dashboard.js"></script>
  <script src="../src/fixedbar.js"></script>
</body>
</html>
